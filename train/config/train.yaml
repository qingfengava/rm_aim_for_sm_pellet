model:
  input_size: 32
  in_channels: 1
  num_classes: 1
  channels: [8, 16, 32]   # 低占用默认通道

training:
  epochs: 40
  batch_size: 64
  num_workers: 2
  device: "auto"   # auto / cpu / cuda
  deterministic: true
  seed: 42
  weights_path: "model/pellet_cls.pth"

optimizer:
  type: "adam"     # adam / sgd
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  enable: true
  type: "step"     # step / cosine
  step_size: 10
  gamma: 0.5

loss:
  type: "bce_logits"
  auto_pos_weight: true
  pos_weight: 3.0        # auto_pos_weight=false 时生效
  min_pos_weight: 1.0    # 自动计算时下限
  max_pos_weight: 10.0   # 自动计算时上限

dataset:
  train_path: "train/dataset/train"
  val_path: "train/dataset/val"
  shuffle: true

augmentation:
  enable: true

  motion_blur:
    enable: true
    kernel_sizes: [3, 5]
    prob: 0.5

  gaussian_noise:
    enable: true
    mean: 0
    std: 8
    prob: 0.5

  brightness:
    enable: true
    min: 0.7
    max: 1.3
    prob: 0.5

normalization:
  enable: true
  mean: 0.5
  std: 0.5

training_strategy:
  early_stopping:
    enable: true
    patience: 10

  save_best_only: true

  log_interval: 20

threshold:
  default: 0.5
  use_dynamic: true
  recommended_range: [0.55, 0.85]

export:
  onnx: true
  onnx_path: "model/pellet_cls.onnx"
  simplify: false

debug:
  print_batch_loss: false
