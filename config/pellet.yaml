camera:
  wust_vl_config_path: "config/camera.yaml"
  startup_timeout_ms: 1000

detector:
  queue_capacity: 5
  queue_valid_ms: 1000
  pop_poll_ms: 2
  detect_pop_timeout_ms: 100
  thread_monitor_enable: 1

motion:
  gaussian_ksize: 1
  gaussian_sigma: 0.0

  # KNN 背景减除（低占用）
  bg_backend: "knn"
  bg_history: 30
  bg_var_threshold: 14.0
  bg_learning_rate: -1.0
  bg_downsample: 2

  # 全局扰动保护
  global_fg_ratio_max: 0.50
  global_response_attenuation: 0.25

  # 形态学（关闭以保留小目标）
  morph_enable: 0
  morph_type: "open"
  morph_kernel: 3
  morph_iters: 1

  # 运动确认
  motion_confirm_enable: 1
  motion_confirm_threshold: 10

  # 候选过滤
  area_min: 3
  area_max: 150
  ratio_max: 4.0
  extent_min: 0.15
  contrast_min: 0.04
  motion_score_min: 0.04
  nms_enable: 1
  nms_iou: 0.25
  max_candidates: 6

roi:
  output_size: 32
  size_scale: 2.2
  min_crop: 20
  max_crop: 48

inference:
  backend: "onnxruntime" # "onnxruntime" / "tensorrt" / "openvino" / "ncnn"
  model_path: "model/pellet_cls.onnx" #通用模型路径
  device: "GPU"

  input_blob_name: "input"
  output_blob_name: "output"

  input_width: 32
  input_height: 32

  batch_size: 1

  precision: "fp32"   # fp32 / int8
  int8_model_path: ""

  engine_path: ""
  trt_require_prebuilt_engine: 0   # 0=允许自动构建 engine；1=必须使用预构建 engine（缺失则启动失败）

  openvino_model_path: ""
  ncnn_param_path: ""
  ncnn_bin_path: ""

  num_threads: 1

  # 分类阈值：
  # - score >= positive_threshold：判定为阳性
  # - weak_threshold <= score < positive_threshold：弱阳性候选
  #   若本帧无强阳性，可回退输出最高弱阳性（降低漏检）
  positive_threshold: 0.65
  weak_threshold: 0.40

  max_candidates: 3 #NMS 后送入分类器的 TopK 上限

debug:
  # 位掩码（十进制），每个 bit 独立控制一个模块的输出，0=全关
  #   1=采集日志  2=pipeline统计  4=线程状态
  #   8=1秒汇总  16=推理日志
  #   例: 3=采集+统计  7=采集+统计+线程  31=全部
  modules_mask: 0
