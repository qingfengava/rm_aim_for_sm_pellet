camera:
  wust_vl_config_path: "config/camera.yaml"
  startup_timeout_ms: 1000

detector:
  queue_capacity: 5
  queue_valid_ms: 1000
  pop_poll_ms: 2
  detect_pop_timeout_ms: 100
  thread_monitor_enable: 1

motion:
  gaussian_ksize: 3
  gaussian_sigma: 0.8
  adaptive_threshold: 1

  diff_threshold: 18
  diff_threshold_min: 10
  diff_threshold_max: 35

  morph_enable: 1
  morph_type: "open" #open/close
  morph_kernel: 3
  morph_iters: 1
  
  area_min: 3
  area_max: 120
  ratio_max: 4.0
  extent_min: 0.2
  contrast_min: 0.06
  motion_score_min: 0.08
  nms_enable: 1
  nms_iou: 0.25
  max_candidates: 6 #pre-nms

roi:
  output_size: 32
  size_scale: 2.2
  min_crop: 20
  max_crop: 48

inference:
  backend: "onnxruntime"
  model_path: "model/pellet_cls.onnx" #通用路径，下方路径为空时使用，统一为onnx
  device: "GPU"
  input_blob_name: "input"
  output_blob_name: "output"
  input_width: 32
  input_height: 32
  batch_size: 1
  precision: "fp32" # fp32/int8
  int8_model_path: "" # 空则回退 model_path
  engine_path: "" #INT8 + 空engine_path 直接失败
  trt_require_prebuilt_engine: 0 # 0:允许自动构建, 1:engine不存在时直接失败
  openvino_model_path: ""
  ncnn_param_path: ""
  ncnn_bin_path: ""
  num_threads: 1
  positive_threshold: 0.75
  weak_threshold: 0.45
  max_candidates: 2 #post-nms

debug:
  enable: 0
  level: 0  # 自动分级：0=capture，1=capture+pipeline_stats+thread_status，2=all
  modules_mask: 0
  # 手动位掩码覆盖：
  # 0   -> 不手动覆盖，走 enable + level
  # 非0 -> 按位启用并覆盖 enable/level（例如 1=仅capture，33=capture+infer）
  # bit0:capture bit1:morphology bit2:pipeline_stats bit3:thread_status bit4:window bit5:infer
