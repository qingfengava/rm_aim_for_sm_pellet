type: HIK_CAMERA

hik_camera:
  target_sn: "DA0000000"

  acquisition_frame_rate_enable: true
  acquisition_frame_rate: 120.0

  exposure_time: 3500.0
  gain: 10.0
  gamma: 0.7

  runtime_control_enable: true

  adc_bit_depth: "Bits_8"
  pixel_format: "BayerRG8"

  width: 640
  height: 480
  offset_x: 0
  offset_y: 0
  reverse_x: false
  reverse_y: false

  # Trigger: none / software / hardware
  trigger_type: "none"
  trigger_source: ""
  # hardware only: 1=RisingEdge, 0=FallingEdge
  trigger_activation: 0
  # software trigger only, 0 means no throttle
  software_trigger_interval_ms: 0

  # Output conversion
  use_rgb: false
  use_ea: false
  use_raw: false
  use_cuda_cvt: false
